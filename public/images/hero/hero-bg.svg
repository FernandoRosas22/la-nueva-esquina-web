<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Base oscura con leve variación, simula madera oscura de parrilla/mesa -->
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0a08"/>
      <stop offset="50%" stop-color="#15110d"/>
      <stop offset="100%" stop-color="#0a0807"/>
    </linearGradient>

    <!-- Vetas de madera sutiles -->
    <linearGradient id="grain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c160f" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#241b10" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1c160f" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Brasas / luz cálida difusa, simula brasas de parrilla -->
    <radialGradient id="embers1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0291e" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="embers2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c518" stop-opacity="0.75"/>
      <stop offset="55%" stop-color="#f5c518" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f5c518" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="goldGlow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>

    <!-- Viñeta para que los bordes se funden con el fondo noche del sitio -->
    <radialGradient id="vignette" cx="50%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="75%" stop-color="#000000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#base)"/>

  <!-- Vetas de madera horizontales sutiles -->
  <g opacity="0.6">
    <rect y="60" width="1600" height="14" fill="url(#grain)"/>
    <rect y="160" width="1600" height="22" fill="url(#grain)"/>
    <rect y="280" width="1600" height="10" fill="url(#grain)"/>
    <rect y="420" width="1600" height="18" fill="url(#grain)"/>
    <rect y="560" width="1600" height="12" fill="url(#grain)"/>
    <rect y="700" width="1600" height="20" fill="url(#grain)"/>
    <rect y="840" width="1600" height="14" fill="url(#grain)"/>
  </g>

  <!-- Resplandor dorado ambiental central -->
  <rect width="1600" height="1000" fill="url(#goldGlow)"/>

  <!-- Brasas difusas, distribuidas como si fueran brasas de parrilla vistas desde arriba -->
  <circle cx="320" cy="700" r="260" fill="url(#embers1)"/>
  <circle cx="1280" cy="240" r="300" fill="url(#embers2)"/>
  <circle cx="980" cy="780" r="220" fill="url(#embers1)"/>
  <circle cx="200" cy="200" r="200" fill="url(#embers2)"/>

  <!-- Viñeta final -->
  <rect width="1600" height="1000" fill="url(#vignette)"/>
</svg>
